version: '3.9'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: bioanalytical
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"  # host 5433 — 5432 is already used locally
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/001_create_tables.sql:/docker-entrypoint-initdb.d/001_create_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bioanalytical
    volumes:
      - ./data:/app/data

volumes:
  postgres_data: